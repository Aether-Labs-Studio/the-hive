name: PR Checks

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Test and Vet
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run test suite
        run: make test

      - name: Run go vet
        run: make vet
