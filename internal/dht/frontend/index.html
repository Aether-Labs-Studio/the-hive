<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hive · Live Monitor</title>
    <style>
        body {
            background-color: #0f172a;
            color: #f1f5f9;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 16px;
            flex-shrink: 0;
        }
        .logo { font-size: 24px; }
        .title { font-size: 20px; font-weight: 700; color: #fbbf24; }
        .status {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #94a3b8;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #ef4444;
            border-radius: 50%;
        }
        .status-dot.online { background-color: #22c55e; box-shadow: 0 0 8px #22c55e; }

        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
            flex-grow: 1;
            min-height: 0;
        }

        .graph-container {
            background-color: #020617;
            border-radius: 12px;
            border: 1px solid #1e293b;
            position: relative;
            overflow: hidden;
        }
        #p2p-graph {
            width: 100%;
            height: 100%;
        }

        .sidebar {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-height: 0;
        }

        .grid-stats {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .card {
            background-color: #1e293b;
            padding: 12px 16px;
            border-radius: 8px;
            border: 1px solid #334155;
        }
        .card-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
        .card-value { font-size: 20px; font-weight: 700; margin-top: 2px; color: #f8fafc; }
        .card-subvalue { font-size: 12px; color: #64748b; margin-top: 2px; }

        .log-container {
            background-color: #020617;
            border-radius: 8px;
            border: 1px solid #334155;
            overflow: hidden;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
        }
        .log-header {
            padding: 10px 16px;
            background-color: #1e293b;
            border-bottom: 1px solid #334155;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
        }
        .log-scroll {
            overflow-y: auto;
            flex-grow: 1;
        }
        .log-table {
            width: 100%;
            border-collapse: collapse;
            font-family: 'JetBrains Mono', 'Fira Code', monospace;
            font-size: 12px;
        }
        .log-table th {
            text-align: left;
            padding: 8px 12px;
            background-color: #0f172a;
            color: #64748b;
            font-weight: 600;
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
        }
        .log-table td {
            padding: 6px 12px;
            border-bottom: 1px solid #0f172a;
        }
        .event-PeerJoined { color: #22c55e; }
        .event-BucketRefresh { color: #3b82f6; }
        .event-DataReplicated { color: #a855f7; }
        .event-RPCError { color: #f43f5e; }
        .timestamp { color: #475569; }
        .details { color: #cbd5e1; }
        .node-id { color: #fbbf24; font-weight: 600; }

        /* Graph Elements */
        .node { cursor: pointer; }
        .node circle { stroke: #1e293b; stroke-width: 2px; transition: r 0.2s; }
        .node.local circle { fill: #fbbf24; filter: drop-shadow(0 0 8px #fbbf24); }
        .node.peer circle { fill: #3b82f6; }
        .node text { fill: #94a3b8; font-size: 10px; pointer-events: none; }
        .link { stroke: #334155; stroke-width: 1px; stroke-opacity: 0.4; }
        
        .pulse {
            fill: none;
            stroke: #a855f7;
            stroke-width: 2;
            opacity: 0;
        }

        .state-btn {
            background: transparent;
            border: none;
            color: #64748b;
            padding: 4px 12px;
            font-size: 11px;
            font-weight: 600;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .state-btn.active { color: #f8fafc; }
        .state-btn#btn-offline.active { background: #ef4444; }
        .state-btn#btn-local.active { background: #eab308; color: #0f172a; }
        .state-btn#btn-online.active { background: #22c55e; color: #0f172a; }
    </style>
</head>
<body>
    <div class="header">
        <span class="logo">🐝</span>
        <span class="title">The Hive · Live Monitor</span>
        
        <div id="network-selector" style="margin-left: 40px; display: flex; gap: 8px; background: #1e293b; padding: 4px; border-radius: 20px; border: 1px solid #334155;">
            <button onclick="setNetworkState('offline')" class="state-btn" id="btn-offline">Offline</button>
            <button onclick="setNetworkState('local')" class="state-btn" id="btn-local">Local</button>
            <button onclick="setNetworkState('online')" class="state-btn" id="btn-online">Online</button>
        </div>

        <div class="status">
            <div id="status-dot" class="status-dot"></div>
            <span id="status-text">Disconnected</span>
        </div>
    </div>

    <div class="main-layout">
        <div class="graph-container">
            <svg id="p2p-graph">
                <g id="links"></g>
                <g id="nodes"></g>
                <g id="animations"></g>
            </svg>
        </div>

        <div class="sidebar">
            <div class="grid-stats">
                <div class="card">
                    <div class="card-label">Active Peers</div>
                    <div id="count-peers" class="card-value">0</div>
                    <div class="card-subvalue">Connected Neighbors</div>
                </div>
                <div class="card">
                    <div class="card-label">Shared Memory</div>
                    <div id="count-keys" class="card-value">0</div>
                    <div class="card-subvalue">Unique Knowledge Chunks</div>
                </div>
                <div class="card">
                    <div class="card-label">System Health</div>
                    <div id="mem-usage" class="card-value">0 MB</div>
                    <div class="card-subvalue">Process RAM Allocation</div>
                </div>
            </div>

            <div class="card" style="flex-grow: 0;">
                <div class="card-label">Trending in Swarm</div>
                <div id="hot-keywords" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;">
                    <!-- Keywords will appear here -->
                </div>
            </div>

            <div class="card" style="flex-grow: 0;">
                <div class="card-label">Subscriptions</div>
                <div style="display: flex; gap: 4px; margin-top: 8px;">
                    <input type="text" id="sub-input" placeholder="Keyword..." style="flex-grow: 1; background: #020617; border: 1px solid #334155; color: white; border-radius: 4px; padding: 4px 8px; font-size: 12px;">
                    <button onclick="addSubscription()" style="background: #3b82f6; border: none; color: white; border-radius: 4px; padding: 0 12px; cursor: pointer;">+</button>
                </div>
                <div id="sub-list" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;">
                    <!-- Subscriptions will appear here -->
                </div>
            </div>

            <div class="log-container">
                <div class="log-header">
                    <span>Event Stream</span>
                    <span id="event-rate" style="color: #64748b; font-weight: normal;">Live</span>
                </div>
                <div class="log-scroll">
                    <table class="log-table">
                        <thead>
                            <tr>
                                <th>Event</th>
                                <th>Node ID</th>
                            </tr>
                        </thead>
                        <tbody id="event-log"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const svg = document.getElementById('p2p-graph');
        const nodesGroup = document.getElementById('nodes');
        const linksGroup = document.getElementById('links');
        const animGroup = document.getElementById('animations');
        const logBody = document.getElementById('event-log');
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');

        let currentState = 'online';
        function updateStateUI(state) {
            currentState = state;
            document.querySelectorAll('.state-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-${state}`).classList.add('active');
            
            if (state === 'offline') {
                nodes.clear();
                links.length = 0;
                renderNodes();
                renderLinks();
            }
        }
        updateStateUI('online'); // Initial

        async function setNetworkState(state) {
            try {
                const resp = await fetch('/api/state', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ state })
                });
                if (resp.ok) {
                    updateStateUI(state);
                }
            } catch (err) {
                console.error('Failed to set state:', err);
            }
        }

        let width, height;
        function updateSize() {
            width = svg.clientWidth;
            height = svg.clientHeight;
        }
        window.addEventListener('resize', updateSize);
        updateSize();

        // State
        const nodes = new Map(); // id -> {id, x, y, vx, vy, isLocal}
        const links = [];
        let localNodeId = null;

        function addNode(id, isLocal = false) {
            if (nodes.has(id)) return nodes.get(id);
            const node = {
                id,
                x: width / 2 + (Math.random() - 0.5) * 100,
                y: height / 2 + (Math.random() - 0.5) * 100,
                vx: 0,
                vy: 0,
                isLocal
            };
            nodes.set(id, node);
            if (isLocal) localNodeId = id;
            renderNodes();
            return node;
        }

        function syncTopology(neighbors) {
            // Remove neighbors not in the list (but keep local)
            const neighborSet = new Set(neighbors);
            for (const [id, node] of nodes) {
                if (!node.isLocal && !neighborSet.has(id)) {
                    nodes.delete(id);
                }
            }
            // Add new neighbors
            neighbors.forEach(id => addNode(id));
            
            // Rebuild links (always from local to all neighbors)
            links.length = 0;
            if (localNodeId) {
                const local = nodes.get(localNodeId);
                nodes.forEach(node => {
                    if (node.id !== localNodeId) {
                        links.push({ source: local, target: node });
                    }
                });
            }
            renderLinks();
        }

        function renderNodes() {
            nodesGroup.innerHTML = '';
            nodes.forEach(node => {
                const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
                g.setAttribute("class", `node ${node.isLocal ? 'local' : 'peer'}`);
                g.setAttribute("transform", `translate(${node.x},${node.y})`);
                
                const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                circle.setAttribute("r", node.isLocal ? 12 : 8);
                
                const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                text.setAttribute("dy", 25);
                text.setAttribute("text-anchor", "middle");
                text.textContent = node.id.substring(0, 6);
                
                g.appendChild(circle);
                g.appendChild(text);
                nodesGroup.appendChild(g);
                node.element = g;
            });
        }

        function renderLinks() {
            linksGroup.innerHTML = '';
            links.forEach(link => {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("class", "link");
                linksGroup.appendChild(line);
                link.element = line;
            });
        }

        // Physics Engine
        function simulation() {
            const centerX = width / 2;
            const centerY = height / 2;
            const nodeList = Array.from(nodes.values());
            const friction = 0.9;
            const repulse = 1500;

            for (let i = 0; i < nodeList.length; i++) {
                const n1 = nodeList[i];
                
                if (n1.isLocal) {
                    n1.x = centerX;
                    n1.y = centerY;
                } else {
                    // Attraction to center
                    n1.vx += (centerX - n1.x) * 0.02;
                    n1.vy += (centerY - n1.y) * 0.02;
                }

                // Repulsion
                for (let j = i + 1; j < nodeList.length; j++) {
                    const n2 = nodeList[j];
                    const dx = n2.x - n1.x;
                    const dy = n2.y - n1.y;
                    const distSq = dx * dx + dy * dy + 0.1;
                    const force = repulse / distSq;
                    const fx = (dx / Math.sqrt(distSq)) * force;
                    const fy = (dy / Math.sqrt(distSq)) * force;
                    n1.vx -= fx; n1.vy -= fy;
                    n2.vx += fx; n2.vy += fy;
                }
            }

            nodeList.forEach(n => {
                if (!n.isLocal) {
                    n.x += n.vx;
                    n.y += n.vy;

                    n.vx *= friction;
                    n.vy *= friction;
                    n.x = Math.max(20, Math.min(width - 20, n.x));
                    n.y = Math.max(20, Math.min(height - 20, n.y));
                }
                if (n.element) {
                    n.element.setAttribute("transform", `translate(${n.x},${n.y})`);
                }
            });

            links.forEach(l => {
                if (l.element) {
                    l.element.setAttribute("x1", l.source.x);
                    l.element.setAttribute("y1", l.source.y);
                    l.element.setAttribute("x2", l.target.x);
                    l.element.setAttribute("y2", l.target.y);
                }
            });

            requestAnimationFrame(simulation);
        }
        setTimeout(simulation, 100);

        function createPulse(targetId) {
            const target = nodes.get(targetId);
            const source = nodes.get(localNodeId);
            if (!source || !target) return;

            const circle = document.createElementNS("http://www.w3.org/2000/svg", "circle");
            circle.setAttribute("r", 4);
            circle.setAttribute("fill", "#a855f7");
            circle.setAttribute("opacity", "1");
            animGroup.appendChild(circle);

            const startTime = performance.now();
            const duration = 800;

            function animate(time) {
                const elapsed = time - startTime;
                const p = Math.min(elapsed / duration, 1);
                
                const x = source.x + (target.x - source.x) * p;
                const y = source.y + (target.y - source.y) * p;
                
                circle.setAttribute("cx", x);
                circle.setAttribute("cy", y);
                circle.setAttribute("opacity", 1 - p);

                if (p < 1) requestAnimationFrame(animate);
                else circle.remove();
            }
            requestAnimationFrame(animate);
        }

        function showTopicAlert(keyword, details) {
            // Simple visual indicator on the graph or a toast
            const target = nodes.get(localNodeId);
            if (!target) return;
            
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.setAttribute("x", target.x);
            text.setAttribute("y", target.y - 30);
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("fill", "#22c55e");
            text.setAttribute("font-weight", "bold");
            text.style.fontSize = "14px";
            text.style.pointerEvents = "none";
            text.textContent = `🎯 ${keyword}!`;
            animGroup.appendChild(text);

            setTimeout(() => text.remove(), 3000);
        }

        async function addSubscription() {
            const input = document.getElementById('sub-input');
            const kw = input.value.trim();
            if (!kw) return;
            try {
                await fetch('/api/subscribe', {
                    method: 'POST',
                    body: JSON.stringify({ keyword: kw, action: 'subscribe' })
                });
                input.value = '';
                loadSubscriptions();
            } catch (err) { console.error(err); }
        }

        async function removeSubscription(kw) {
            try {
                await fetch('/api/subscribe', {
                    method: 'POST',
                    body: JSON.stringify({ keyword: kw, action: 'unsubscribe' })
                });
                loadSubscriptions();
            } catch (err) { console.error(err); }
        }

        async function loadSubscriptions() {
            try {
                const resp = await fetch('/api/subscriptions');
                const data = await resp.json();
                const container = document.getElementById('sub-list');
                container.innerHTML = '';
                (data.subscriptions || []).forEach(kw => {
                    const span = document.createElement('span');
                    span.style.background = '#1e293b';
                    span.style.border = '1px solid #334155';
                    span.style.padding = '2px 8px';
                    span.style.borderRadius = '4px';
                    span.style.fontSize = '10px';
                    span.style.cursor = 'pointer';
                    span.textContent = kw;
                    span.title = 'Click to unsubscribe';
                    span.onclick = () => removeSubscription(kw);
                    container.appendChild(span);
                });
            } catch (err) { console.error(err); }
        }
        loadSubscriptions();

        function connect() {
            const es = new EventSource('/events');
            es.onopen = () => { statusDot.classList.add('online'); statusText.textContent = 'Network Live'; };
            es.onerror = () => { statusDot.classList.remove('online'); statusText.textContent = 'Disconnected'; };

            es.onmessage = (e) => {
                const event = JSON.parse(e.data);
                
                if (event.type === 'TopologySync') {
                    const p = event.payload;
                    document.getElementById('count-peers').textContent = p.neighbors.length;
                    document.getElementById('count-keys').textContent = p.stats.local_keys;
                    document.getElementById('mem-usage').textContent = (p.stats.memory_bytes / 1024 / 1024).toFixed(1) + ' MB';
                    
                    // Update Hot Keywords
                    const kwContainer = document.getElementById('hot-keywords');
                    kwContainer.innerHTML = '';
                    (p.hot_keywords || []).forEach(kw => {
                        const span = document.createElement('span');
                        span.style.background = '#334155';
                        span.style.padding = '2px 8px';
                        span.style.borderRadius = '10px';
                        span.style.fontSize = '10px';
                        span.style.color = '#fbbf24';
                        span.textContent = kw;
                        kwContainer.appendChild(span);
                    });

                    if (!localNodeId) addNode(event.node_id, true);
                    syncTopology(p.neighbors);
                } else if (event.type === 'PeerJoined') {
                    addNode(event.node_id);
                } else if (event.type === 'DataReplicated') {
                    if (event.node_id) createPulse(event.node_id);
                } else if (event.type === 'TopicMatch') {
                    showTopicAlert(event.node_id, event.details);
                }

                const row = document.createElement('tr');
                row.innerHTML = `<td class="event-${event.type}">${event.type}</td><td class="node-id">${(event.node_id || '-').substring(0, 8)}</td>`;
                logBody.insertBefore(row, logBody.firstChild);
                if (logBody.children.length > 30) logBody.removeChild(logBody.lastChild);
            };
        }
        connect();
    </script>
</body>
</html>
